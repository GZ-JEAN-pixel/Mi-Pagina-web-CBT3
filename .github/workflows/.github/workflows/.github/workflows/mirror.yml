name: 🌐 Mirror Sitio Web

on:
  # Ejecutar manualmente desde GitHub
  workflow_dispatch:
    inputs:
      url:
        description: 'URL del sitio a descargar'
        required: true
        default: 'https://cbt3otzolotepec.dpdns.org'

  # También ejecutar automáticamente cada semana (opcional)
  schedule:
    - cron: '0 6 * * 1'  # Cada lunes a las 6am

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repo donde se guardará el mirror
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Instalar wget y herramientas necesarias
      - name: 🔧 Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget

      # 3. Hacer el mirror completo del sitio
      - name: 🌐 Descargar sitio web completo
        run: |
          URL="${{ github.event.inputs.url || 'https://cbt3otzolotepec.dpdns.org' }}"
          echo "Descargando: $URL"

          wget \
            --recursive \
            --level=inf \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --backup-converted \
            --no-clobber \
            --wait=1 \
            --random-wait \
            --timeout=30 \
            --tries=3 \
            --no-check-certificate \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            --directory-prefix=./sitio \
            "$URL" || true

          echo "✅ Descarga completada"
          echo "📁 Archivos descargados:"
          find ./sitio -type f | wc -l

      # 4. Crear README con info del mirror
      - name: 📝 Crear README
        run: |
          URL="${{ github.event.inputs.url || 'https://cbt3otzolotepec.dpdns.org' }}"
          FECHA=$(date '+%Y-%m-%d %H:%M UTC')
          cat > README.md << EOF
          # 🌐 Mirror: $URL

          Sitio web archivado automáticamente con GitHub Actions.

          - **URL original:** $URL
          - **Última actualización:** $FECHA
          - **Generado por:** GitHub Actions (mirror.yml)

          ## Ver localmente

          \`\`\`bash
          python -m http.server 8080
          \`\`\`
          Luego abre: http://localhost:8080/sitio/

          EOF

      # 5. Commit y push de todos los archivos descargados
      - name: 💾 Commit y Push al repositorio
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add .
          git status

          # Solo hace commit si hay cambios
          if git diff --staged --quiet; then
            echo "⚠️ No hay cambios nuevos, nada que commitear."
          else
            FECHA=$(date '+%Y-%m-%d %H:%M')
            git commit -m "🌐 Mirror actualizado: $FECHA"
            git push
            echo "✅ Push completado exitosamente"
          fi

      # 6. Resumen final
      - name: 📊 Resumen
        run: |
          echo "=============================="
          echo "✅ Mirror completado"
          echo "=============================="
          echo "Archivos totales:"
          find ./sitio -type f | wc -l
          echo ""
          echo "Tamaño total:"
          du -sh ./sitio 2>/dev/null || echo "N/A"
          echo "=============================="
